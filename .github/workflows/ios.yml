# Build recipe: unsigned IPA of the NATIVE SwiftUI app (Sideloadly signs it).
# The web/Capacitor pipeline is gone — ios-native/ + xcodegen is the whole story.
name: iOS build (unsigned IPA for AltStore)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          cp assets/icon.png ios-native/Assets.xcassets/AppIcon.appiconset/icon.png
          cd ios-native
          xcodegen generate
          ls -la

      - name: Build unsigned app
        run: |
          cd ios-native
          xcodebuild -project Shidoku.xcodeproj -scheme Shidoku -configuration Release -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP="ios-native/build/Build/Products/Release-iphoneos/Shidoku.app"
          # never ship without the pieces that bit us before
          plutil -p "$APP/Info.plist" | grep -q NSLocalNetworkUsageDescription
          plutil -p "$APP/Info.plist" | grep -q NSCameraUsageDescription
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry Shidoku.ipa Payload
          ls -la Shidoku.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: Shidoku-ipa
          path: Shidoku.ipa
          retention-days: 30

      # Real screenshots of the real app. Nobody on this project has a Mac,
      # simulator or device, so without this every UI change is written blind
      # and only judged after a sideload. Boot a 390x844 simulator, force each
      # UI state via -shidokuPreview, and upload the PNGs.
      - name: Screenshot every UI state
        continue-on-error: true
        run: |
          set -x
          cd ios-native
          xcodebuild -project Shidoku.xcodeproj -scheme Shidoku -configuration Debug \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath simbuild \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          APP="simbuild/Build/Products/Debug-iphonesimulator/Shidoku.app"

          # a 390x844 device, same logical geometry as his iPhone 16e
          DEV=$(xcrun simctl list devicetypes | grep -oE 'iPhone (16e|14|13)' | head -1)
          echo "device: $DEV"
          UDID=$(xcrun simctl create shidoku-shot \
            "com.apple.CoreSimulator.SimDeviceType.$(echo "$DEV" | tr ' ' '-')" || true)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys;d=json.load(sys.stdin)['devices'];print([x['udid'] for v in d.values() for x in v if '390' or True][0])")
          fi
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          xcrun simctl install "$UDID" "$APP"
          # otherwise the camera permission alert sits over every screenshot
          xcrun simctl privacy "$UDID" grant camera com.pake.shidoku || true

          mkdir -p ../shots
          for S in live capture asking answer bare; do
            xcrun simctl terminate "$UDID" com.pake.shidoku || true
            xcrun simctl launch "$UDID" com.pake.shidoku -shidokuPreview -shidokuState "$S"
            sleep 4
            xcrun simctl io "$UDID" screenshot "../shots/$S.png" || true
          done
          xcrun simctl shutdown "$UDID" || true
          ls -la ../shots

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Shidoku-screenshots
          path: shots/*.png
          retention-days: 30

      # A motion VIDEO of the real animation code. Stills never caught the
      # pill→card morph, the pill fade-in or the dismissal cascade, so motion
      # bugs kept shipping. -shidokuSequence drives the actual state machine
      # (fake local stream, no network) while the sim records. Reuses the
      # simbuild app the screenshot step built; continue-on-error like it.
      - name: Record motion video
        continue-on-error: true
        run: |
          set -x
          cd ios-native
          APP="simbuild/Build/Products/Debug-iphonesimulator/Shidoku.app"

          DEV=$(xcrun simctl list devicetypes | grep -oE 'iPhone (16e|14|13)' | head -1)
          echo "device: $DEV"
          UDID=$(xcrun simctl create shidoku-motion \
            "com.apple.CoreSimulator.SimDeviceType.$(echo "$DEV" | tr ' ' '-')" || true)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys;d=json.load(sys.stdin)['devices'];print([x['udid'] for v in d.values() for x in v][0])")
          fi
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          xcrun simctl install "$UDID" "$APP"
          # otherwise the camera permission alert sits over the recording
          xcrun simctl privacy "$UDID" grant camera com.pake.shidoku || true

          mkdir -p ../motion
          # recordVideo MUST be stopped with SIGINT to finalize the moov atom —
          # a plain kill leaves a corrupt, unplayable file.
          xcrun simctl io "$UDID" recordVideo --codec=h264 --force ../motion/shidoku.mp4 &
          REC=$!
          sleep 2                          # let the recorder spin up
          # || true so a launch hiccup still reaches the SIGINT finalize below
          xcrun simctl launch "$UDID" com.pake.shidoku -shidokuPreview -shidokuSequence || true
          sleep 16                         # the scripted flow runs ~7 s; margin for launch
          kill -INT "$REC" || true
          sleep 3                          # let simctl flush the moov atom
          xcrun simctl shutdown "$UDID" || true
          ls -la ../motion

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Shidoku-motion
          path: motion/*.mp4
          retention-days: 30
