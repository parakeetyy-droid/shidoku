# Build recipe: unsigned IPA of the NATIVE SwiftUI app (Sideloadly signs it).
# The web/Capacitor pipeline is gone — ios-native/ + xcodegen is the whole story.
name: iOS build (unsigned IPA for AltStore)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          cp assets/icon.png ios-native/Assets.xcassets/AppIcon.appiconset/icon.png
          cd ios-native
          xcodegen generate
          ls -la

      - name: Build unsigned app
        run: |
          cd ios-native
          xcodebuild -project Shidoku.xcodeproj -scheme Shidoku -configuration Release -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP="ios-native/build/Build/Products/Release-iphoneos/Shidoku.app"
          # never ship without the pieces that bit us before
          plutil -p "$APP/Info.plist" | grep -q NSLocalNetworkUsageDescription
          plutil -p "$APP/Info.plist" | grep -q NSCameraUsageDescription
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry Shidoku.ipa Payload
          ls -la Shidoku.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: Shidoku-ipa
          path: Shidoku.ipa
          retention-days: 30
