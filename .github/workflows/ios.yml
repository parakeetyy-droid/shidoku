# Build recipe: unsigned IPA for AltStore sideloading
name: iOS build (unsigned IPA for AltStore)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Assemble web assets
        run: |
          mkdir -p www
          cp index.html manifest.json icon-180.png icon-192.png icon-512.png www/

      - name: Install Capacitor
        run: npm install

      - name: Add iOS platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Generate icons and splash
        run: npx @capacitor/assets generate --ios --iconBackgroundColor '#0E1013' --splashBackgroundColor '#000000'

      - name: Patch Info.plist (camera permission, ATS, portrait)
        run: |
          P=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Shidoku shows a live viewfinder and analyzes the photo you capture.'" "$P"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$P" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$P" || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$P" || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$P"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$P"
          /usr/libexec/PlistBuddy -c "Print" "$P"

      - name: Build unsigned app
        run: |
          cd ios/App
          ls -la
          if [ -e App.xcworkspace ]; then TARGET="-workspace App.xcworkspace"; else TARGET="-project App.xcodeproj"; fi
          xcodebuild $TARGET -scheme App -configuration Release -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP="ios/App/build/Build/Products/Release-iphoneos/App.app"
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry Shidoku.ipa Payload
          ls -la Shidoku.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: Shidoku-ipa
          path: Shidoku.ipa
          retention-days: 30
