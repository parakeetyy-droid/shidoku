<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shidoku — iPhone 17e simulator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#101114;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  #stage{transform-origin:center center}
  .phone{
    width:418px;height:872px;background:#1a1b1e;border-radius:58px;padding:14px;
    box-shadow:0 24px 80px rgba(0,0,0,.6), inset 0 0 0 2px #2c2d31;
  }
  .screen{
    position:relative;width:390px;height:844px;border-radius:44px;overflow:hidden;background:#000;
  }
  .screen iframe{width:390px;height:844px;border:0;display:block}
  .notch{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:160px;height:32px;background:#000;border-radius:0 0 19px 19px;
    pointer-events:none;z-index:10;
  }
  .homebar{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:99px;background:rgba(255,255,255,.55);
    pointer-events:none;z-index:10;
  }
  #label{color:#6f7178;font-size:12px;letter-spacing:.06em}
</style>
</head>
<body>
<div id="stage">
  <div class="phone">
    <div class="screen">
      <iframe src="index.html?sim" allow="camera; clipboard-write"></iframe>
      <div class="notch"></div>
      <div class="homebar"></div>
    </div>
  </div>
</div>
<div id="label">iPhone 17e &#183; 390&#215;844 @3x &#183; safe areas 47/34 &#183; live app &#8212; edit index.html and press F5</div>
<script>
  const stage = document.getElementById("stage");
  function fit(){
    const s = Math.min((innerHeight - 70) / 872, (innerWidth - 40) / 418, 1);
    stage.style.transform = "scale(" + s + ")";
    stage.style.marginBottom = (-872 * (1 - s)) + "px";
  }
  fit(); addEventListener("resize", fit);
</script>
</body>
</html>
