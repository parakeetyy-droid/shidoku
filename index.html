<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shidoku">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Shidoku</title>
<style>
  :root{
    --sheet:#17191D; --line:rgba(255,255,255,.13); --ink:#F2EFE8; --dim:#9AA0A8;
    --accent:#E3B94F; --err:#E08A7E; --glass:rgba(28,30,34,.55);
    --sat: env(safe-area-inset-top);
    --sab: env(safe-area-inset-bottom);
    /* ── Liquid Glass material (soft, refined) ── */
    --lg-fill: linear-gradient(150deg, rgba(255,255,255,.15), rgba(205,210,220,.05) 48%, rgba(18,20,24,.085));
    --lg-blur: blur(22px) saturate(140%);
    --lg-shadow: 0 5px 18px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.34), inset 0 -12px 26px rgba(255,255,255,.035);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:#000; color:var(--ink); overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .serif{font-family:Georgia,"Times New Roman",serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  input::placeholder{color:#8B9099}
  ::-webkit-scrollbar{display:none}

  /* ── camera screen ── */
  #cam{position:fixed;top:0;left:0;right:0;height:100vh;height:100dvh}
  #vf{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;display:none;opacity:0;transition:opacity .35s ease}
  #vf.on{opacity:1}
  #frozen{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;transition:filter .3s}
  #frozen.dim{filter:brightness(.45)}
  #frozen.frzAnim{animation:frzIn .38s cubic-bezier(.2,.7,.2,1)}
  @keyframes frzIn{from{opacity:.25;transform:scale(1.045)}to{opacity:1;transform:scale(1)}}
  /* capture "liquefy": the frozen photo itself is warped by SVG turbulence
     (filter defined before </body>) and settles into place via JS */
  #statusPill{
    position:absolute;top:calc(14px + var(--sat));left:50%;transform:translateX(-50%);
    z-index:5;font-size:12px;color:#EDEFF2;background:var(--lg-fill);padding:6px 14px;
    border-radius:999px;-webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur);
    box-shadow:var(--lg-shadow);white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.4);
  }
  #retake{
    position:absolute;top:calc(10px + var(--sat));right:14px;z-index:5;display:none;
    width:38px;height:38px;border-radius:999px;background:var(--lg-fill);
    -webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur);
    box-shadow:var(--lg-shadow);
    align-items:center;justify-content:center;
    transition:transform .18s ease;
  }
  #retake svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  #retake:active{transform:scale(.88)}
  #idleHint{
    position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:0 44px;color:var(--dim);font-size:13px;line-height:1.9;
    letter-spacing:.02em;pointer-events:none;
  }

  /* ── bottom bar: Ask · shutter · Search ── */
  #bar{
    position:absolute;left:0;right:0;bottom:0;z-index:4;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 46px calc(52px + var(--sab));
    background:linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0));
  }
  .side{position:relative;display:flex;align-items:center;justify-content:center;width:54px;height:54px}
  .side .circ{
    position:relative;width:54px;height:54px;border-radius:999px;
    background:var(--lg-fill);
    -webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur);
    box-shadow:var(--lg-shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .18s ease;
  }
  .side .circ svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.55))}
  .side:active .circ{transform:scale(.9)}
  .side .lbl{
    position:absolute;top:calc(100% + 9px);left:50%;transform:translateX(-50%);
    font-size:15px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7);white-space:nowrap;
  }
  #shutter{
    position:relative;width:78px;height:78px;border-radius:999px;padding:0;
    -webkit-backdrop-filter:blur(8px) saturate(130%);backdrop-filter:blur(8px) saturate(130%);
    box-shadow:0 6px 20px rgba(0,0,0,.28);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #shutter .ring{
    position:absolute;inset:0;border-radius:999px;
    background:conic-gradient(from 180deg, #FFB3D0, #CBA6FF, #A6CCFF, #FFDFA6, #FFB3D0);
    opacity:.62;filter:blur(.4px);
    box-shadow:inset 0 2px 3px rgba(255,255,255,.55), inset 0 -3px 8px rgba(0,0,0,.14), 0 0 22px rgba(198,140,255,.3);
    animation:rspin 8s linear infinite;
  }
  #shutter .core{
    position:absolute;inset:7px;border-radius:999px;
    background:radial-gradient(125% 125% at 32% 26%, rgba(255,255,255,.98), rgba(236,239,243,.82));
    box-shadow:inset 0 2px 3px rgba(255,255,255,.9), inset 0 -8px 15px rgba(0,0,0,.06), 0 1px 6px rgba(0,0,0,.2);
  }
  #shutter:active{transform:scale(.95)}
  #shutter:active .core{background:radial-gradient(125% 125% at 32% 26%, rgba(240,240,236,.98), rgba(222,224,228,.82))}
  @keyframes rspin{to{transform:rotate(360deg)}}
  #cam.isFrozen #shutter{visibility:hidden}
  #glow{
    position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;
    box-shadow:inset 0 0 46px 10px rgba(236,102,171,.5), inset 0 0 110px 34px rgba(122,92,238,.28);
  }
  #glow.hello{animation:glowPulse 2.4s ease-out .15s 1}
  #glow.snap{
    animation:glowPulse 1.3s ease-out 1;
    box-shadow:inset 0 0 70px 18px rgba(236,102,171,.65), inset 0 0 160px 55px rgba(122,92,238,.42);
  }
  #glow.thinking{animation:glowBreathe 2.2s ease-in-out .2s infinite}
  @keyframes glowPulse{0%{opacity:0}22%{opacity:1}60%{opacity:.7}100%{opacity:0}}
  @keyframes glowBreathe{0%,100%{opacity:.1}50%{opacity:.75}}

  /* ── Ask sheet ── */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:10;display:flex;flex-direction:column;
    max-height:70%;background:linear-gradient(to bottom, rgba(26,28,33,.74), rgba(18,20,24,.82));
    border-radius:26px 26px 0 0;box-shadow:0 -12px 50px rgba(0,0,0,.5);
    padding-bottom:calc(10px + var(--sab));
    -webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%);
    transform:translateY(105%);visibility:hidden;will-change:transform;
    transition:transform .46s cubic-bezier(.32,.72,0,1), visibility 0s linear .46s;
  }
  #sheet.open{transform:translateY(0);visibility:visible;transition:transform .46s cubic-bezier(.32,.72,0,1), visibility 0s}
  .grab{width:38px;height:5px;border-radius:99px;background:rgba(255,255,255,.22);margin:9px auto 0;flex-shrink:0}
  #sheetHead{display:flex;align-items:center;justify-content:space-between;padding:7px 16px 6px}
  .grab,#sheetHead{touch-action:none;-webkit-user-select:none;user-select:none}
  #sheetTitle{font-size:11px;letter-spacing:.18em;color:var(--dim)}
  #sheetClose{
    position:relative;width:30px;height:30px;border-radius:999px;background:var(--lg-fill);
    -webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur);box-shadow:var(--lg-shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .18s ease;
  }
  #sheetClose:active{transform:scale(.88)}
  #thread{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 18px;overscroll-behavior:contain;scroll-behavior:smooth}
  .userMsg{display:flex;justify-content:flex-end;margin:10px 0}
  .userMsg>div{background:#2B2F36;border-radius:14px;padding:8px 13px;font-size:15px;max-width:85%;line-height:1.5}
  .userMsg,.ans,.tools,.srcRow{animation:riseIn .32s cubic-bezier(.2,.7,.2,1) both}
  @keyframes riseIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .ans{font-size:16px;line-height:1.75;padding:6px 0 2px}
  .ans p{margin:5px 0}
  .ans .gap{height:9px}
  .ans .hd{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:12.5px;letter-spacing:.09em;color:var(--accent);margin:13px 0 5px;font-weight:600;
  }
  .ans .bl{display:flex;gap:9px;margin:4px 0}
  .ans .bl span:first-child{color:var(--accent);flex-shrink:0}
  .ans strong{font-weight:600;color:var(--ink)}
  .tools{display:flex;justify-content:flex-end;gap:8px;margin:4px 0 10px}
  .toolBtn{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:11px;color:var(--dim);border-radius:999px;padding:5px 13px;
    background:var(--lg-fill);
    -webkit-backdrop-filter:blur(12px) saturate(180%);backdrop-filter:blur(12px) saturate(180%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), inset 0 0 0 .5px rgba(255,255,255,.1), 0 2px 8px rgba(0,0,0,.2);
  }
  .toolBtn.ok{color:#9BC4AF}
  .srcRow{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px}
  .srcChip{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:11px;color:var(--dim);text-decoration:none;padding:5px 12px;border-radius:999px;
    background:var(--lg-fill);
    -webkit-backdrop-filter:blur(12px) saturate(140%);backdrop-filter:blur(12px) saturate(140%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28), inset 0 0 0 .5px rgba(255,255,255,.09), 0 2px 8px rgba(0,0,0,.18);
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  #loadRow{display:none;align-items:center;gap:10px;padding:6px 18px 10px;color:var(--dim);font-size:13px}
  #loadRow.show{display:flex}
  .pulse{width:8px;height:8px;border-radius:999px;background:var(--accent);animation:pw 1.1s ease-in-out infinite}
  @keyframes pw{0%,100%{opacity:.25}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    .pulse,#glow,#shutter .ring,.userMsg,.ans,.tools,.srcRow,#frozen{animation:none}
    #sheet,#sheet.open{transition:none}
    .pulse{opacity:.9}
  }
  #errRow{display:none;color:var(--err);font-size:13px;line-height:1.6;padding:4px 18px 8px;align-items:center;gap:10px;flex-wrap:wrap}
  #errRow.show{display:flex}
  #inRow{display:flex;gap:9px;padding:8px 16px 4px}
  #inp{
    flex:1;background:linear-gradient(155deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
    border:none;border-radius:999px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.14), inset 0 1px 0 rgba(255,255,255,.22), inset 0 -6px 14px rgba(255,255,255,.03);
    -webkit-backdrop-filter:blur(14px) saturate(180%);backdrop-filter:blur(14px) saturate(180%);
    padding:11px 17px;color:var(--ink);font-size:16px;outline:none;min-width:0;
  }
  #send{
    position:relative;width:44px;height:44px;border-radius:999px;flex-shrink:0;
    background:linear-gradient(155deg, #F0CC6A, var(--accent) 55%, #C99B33);
    box-shadow:0 4px 14px rgba(227,185,79,.4), inset 0 1px 0 rgba(255,255,255,.6), inset 0 -6px 12px rgba(120,86,10,.25);
    display:flex;align-items:center;justify-content:center;
    transition:transform .18s ease, opacity .2s ease;
  }
  #send:active{transform:scale(.9)}
  #send:disabled{opacity:.4}

  /* ── toast ── */
  #toast{
    position:fixed;left:50%;bottom:calc(170px + var(--sab));transform:translateX(-50%);
    z-index:20;background:var(--lg-fill);color:var(--ink);
    -webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur);box-shadow:var(--lg-shadow);
    padding:10px 18px;border-radius:999px;font-size:13px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  #toast.show{opacity:1}

  /* ── Liquid Glass edge: specular rim (::before) + gloss highlight (::after) ── */
  .circ::before, #statusPill::before, #retake::before, #sheetClose::before, #toast::before, #sheet::before{
    content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
    background:linear-gradient(150deg, rgba(255,255,255,.7), rgba(255,255,255,.1) 28%, rgba(255,255,255,0) 54%, rgba(255,255,255,.05) 78%, rgba(255,255,255,.38));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
  }
  .circ::after, #statusPill::after, #retake::after, #sheetClose::after, #toast::after{
    content:"";position:absolute;left:15%;right:15%;top:6%;height:36%;border-radius:inherit;pointer-events:none;
    background:linear-gradient(rgba(255,255,255,.22), rgba(255,255,255,0));filter:blur(3px);opacity:.55;
  }

  /* ── Liquid Glass edge: specular rim + gloss highlight ── */
  .circ::before, #statusPill::before, #retake::before, #sheetClose::before,
  #toast::before, #sheet::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;padding:1.2px;
    background:linear-gradient(155deg, rgba(255,255,255,.95), rgba(255,255,255,.16) 24%,
      rgba(255,255,255,0) 50%, rgba(255,255,255,.08) 74%, rgba(255,255,255,.6));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
  }
  .circ::after, #statusPill::after, #retake::after, #sheetClose::after, #toast::after{
    content:"";position:absolute;left:12%;right:12%;top:7%;height:42%;border-radius:inherit;
    pointer-events:none;background:linear-gradient(rgba(255,255,255,.32), rgba(255,255,255,0));
    filter:blur(2px);opacity:.75;
  }
</style>
</head>
<body>

<div id="cam">
  <video id="vf" playsinline muted autoplay></video>
  <img id="frozen" alt="">
  <div id="statusPill">Starting camera&#8230;</div>
  <button id="retake" aria-label="Back to camera">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <div id="idleHint">Requesting camera access &#8212; tap Allow once.<br>Every launch after that opens straight to the live viewfinder.</div>
  <div id="glow"></div>

  <div id="bar">
    <button class="side" id="askBtn" aria-label="Ask">
      <span class="circ">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6A2.5 2.5 0 0 1 6.5 3.5h11A2.5 2.5 0 0 1 20 6v7.5a2.5 2.5 0 0 1-2.5 2.5H13l-4 4v-4H6.5A2.5 2.5 0 0 1 4 13.5z"/>
          <line x1="8.2" y1="8.4" x2="15.8" y2="8.4"/><line x1="8.2" y1="11.4" x2="13.6" y2="11.4"/>
        </svg>
      </span>
      <span class="lbl">Ask</span>
    </button>

    <button id="shutter" aria-label="Capture"><span class="ring"></span><span class="core"></span></button>

    <button class="side" id="searchBtn" aria-label="Search">
      <span class="circ">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3.2" y="4.4" width="13.6" height="11.6" rx="2.4"/>
          <path d="M5.6 13.2l3.1-3.1 2.4 2.4"/>
          <circle cx="16.9" cy="15.9" r="3.4"/>
          <line x1="19.4" y1="18.4" x2="21.4" y2="20.4"/>
        </svg>
      </span>
      <span class="lbl">Search</span>
    </button>
  </div>
</div>

<div id="sheet">
  <div class="grab"></div>
  <div id="sheetHead">
    <span id="sheetTitle">ASK</span>
    <button id="sheetClose" aria-label="Close">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div id="thread"></div>
  <div id="loadRow"><span class="pulse"></span><span>Thinking&#8230;</span></div>
  <div id="errRow"></div>
  <div id="inRow">
    <input id="inp" placeholder="Ask a follow-up&#8230;" enterkeyhint="send">
    <button id="send" aria-label="Send">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1A1608" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6.5 11.5L12 6l5.5 5.5"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<input type="file" id="camInput" accept="image/*" capture="environment" hidden>
<canvas id="cv" hidden></canvas>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="liquefy" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence id="liqNoise" type="fractalNoise" baseFrequency="0.003 0.0035" numOctaves="1" seed="7" result="n"/>
    <feDisplacementMap id="liqDisp" in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<script>
// ═══════════════ config — edit freely ═══════════════
// In the native shell (capacitor://) there is no same-origin server, so the
// relay address must be absolute: the PC on your Wi-Fi for now, the VPS later.
const NATIVE     = !/^https?:$/.test(location.protocol);
const RELAY      = NATIVE ? "http://192.168.0.102:8790/api/claude" : "/api/claude";
const MAX_TOKENS = 4000;
// The model itself is chosen in server.py on the VPS — this app is vendor-neutral.
const ASK_PROMPT = `You are the engine behind a personal Visual Intelligence camera, built for an advanced English learner who wants to know what things are really called in American English.

Lead with the everyday American name of the main subject - the word a native speaker would actually say at home or in a store, including genericized brand names (a pocket pack of tissues is "Kleenex", cotton swabs are "Q-tips", adhesive bandages are "Band-Aids", sticky notes are "Post-its"). If the everyday name and the precise name differ, give both.

Then, briefly:
- One or two natural collocations or verb pairings a native speaker would use with it.
- If there is text in the photo, transcribe the important part; translate non-English text into English.
- For posters, tickets, and labels: the key facts (what, when, where, how much).
- If identification is uncertain, say so and name the plausible alternatives.

When the exact name, brand, or a current fact matters, verify with Google Search before answering rather than guessing.

Keep the whole answer compact - a few short lines. Go deeper only when asked a follow-up. English only. No greetings, no filler, no praise.`;
// ════════════════════════════════════════════════════

// ── simulator (?sim): force the real-camera path to fail so the app never grabs
//    a webcam in the desktop frame. The bottom sim block then paints sample.jpg
//    into the viewfinder and wires the shutter / Ask to it. Never runs outside
//    ?sim — the native shell and the phone have no ?sim in their URL.
const SIM = new URLSearchParams(location.search).has("sim");
if(SIM){
  const md = navigator.mediaDevices || (navigator.mediaDevices = {});
  md.getUserMedia = ()=>Promise.reject(new DOMException("sim","NotFoundError"));
}

const $ = id => document.getElementById(id);
const cam=$("cam"), vf=$("vf"), frozen=$("frozen"), statusPill=$("statusPill"),
      retake=$("retake"), idleHint=$("idleHint"),
      askBtn=$("askBtn"), shutter=$("shutter"), searchBtn=$("searchBtn"),
      sheet=$("sheet"), sheetClose=$("sheetClose"), thread=$("thread"),
      loadRow=$("loadRow"), errRow=$("errRow"), inp=$("inp"), send=$("send"),
      toast=$("toast"), camInput=$("camInput"), cv=$("cv"),
      glow=$("glow"), liqNoise=$("liqNoise"), liqDisp=$("liqDisp"), sheetHead=$("sheetHead"),
      grab=document.querySelector(".grab");

let stream=null, live=false, starting=false, fallback=false;
let frozenB64=null, messages=[], loading=false, pendingAsk=false;

// ── camera: live on launch, stop when hidden, resume when visible ──
async function startCamera(){
  if(starting || live || frozenB64) return;
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
    enterFallback(window.isSecureContext
      ? "Live view isn't supported in this browser.<br>The shutter and Ask open the system camera instead."
      : "This address is HTTP, so iOS hides the live camera.<br>Open the https:// address to get the live viewfinder.<br>The shutter and Ask still open the system camera.");
    return;
  }
  starting=true;
  statusPill.style.display="block"; statusPill.textContent="Starting camera…";
  try{
    const s = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1440} },
      audio:false
    });
    if(document.hidden || frozenB64){ s.getTracks().forEach(t=>t.stop()); return; }
    stream=s; vf.srcObject=s; vf.style.display="block";
    requestAnimationFrame(()=>{ if(live) vf.classList.add("on"); });
    vf.play().catch(()=>{}); // don't await: a hidden tab can stall play() forever; autoplay covers playback
    live=true; fallback=false;
    statusPill.style.display="none"; idleHint.style.display="none";
  }catch(e){
    if(stream) return; // another path already succeeded
    enterFallback("Live view was blocked ("+e.name+").<br>The shutter and Ask still open the system camera.<br>To enable live view: Settings &#8594; Safari &#8594; Camera &#8594; Allow, then relaunch.");
  }finally{
    starting=false;
  }
}
function stopCamera(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  live=false; vf.classList.remove("on"); vf.style.display="none";
}
function enterFallback(msg){
  fallback=true; live=false;
  statusPill.style.display="block"; statusPill.textContent="System camera mode";
  idleHint.innerHTML=msg; idleHint.style.display="flex";
}
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible" && !frozenB64) startCamera();
  if(document.visibilityState==="hidden") stopCamera();
});
startCamera();

// ── capture ──
// capture "liquefy": the frozen photo bends in a few BIG smooth folds - like
// plastic film stretched over the scene being pulled flat - then springs once
// past flat and settles taut. Single-octave, very low frequency noise: no
// granular detail, only whole-image undulation. Random drape per capture.
let liqRun=0;
function liquefy(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const run=++liqRun;
  const fx=0.0022+Math.random()*0.002, fy=fx*(0.7+Math.random()*0.8);
  liqNoise.setAttribute("baseFrequency", fx.toFixed(4)+" "+fy.toFixed(4));
  liqNoise.setAttribute("seed", String(1+Math.floor(Math.random()*999)));
  frozen.style.filter="url(#liquefy)";
  const t0=performance.now(), DUR=950, S0=70+Math.random()*20;
  (function step(){
    if(run!==liqRun) return;                    // superseded by a newer capture
    const p=Math.min(1,(performance.now()-t0)/DUR);
    // film tension: relax fast, swing once gently past flat, end exactly flat
    liqDisp.scale.baseVal=S0*Math.pow(1-p,2.2)*Math.cos(p*Math.PI*1.35);
    if(p<1) requestAnimationFrame(step);
    else frozen.style.filter="";                // back to the crisp GPU path
  })();
  setTimeout(()=>{ if(run===liqRun) frozen.style.filter=""; }, DUR+400); // failsafe if frames stall (backgrounded)
}

function frameToJpeg(source,w,h){
  const MAX=1400, s=Math.min(1, MAX/Math.max(w,h));
  cv.width=Math.round(w*s); cv.height=Math.round(h*s);
  cv.getContext("2d").drawImage(source,0,0,cv.width,cv.height);
  const dataUrl=cv.toDataURL("image/jpeg",0.85);
  return { dataUrl, b64:dataUrl.split(",")[1] };
}
function freeze(img){
  frozenB64=img.b64;
  frozen.src=img.dataUrl; frozen.style.display="block";
  frozen.classList.remove("frzAnim"); void frozen.offsetWidth; frozen.classList.add("frzAnim");
  liquefy();
  glow.classList.remove("snap"); void glow.offsetWidth; glow.classList.add("snap");
  stopCamera();
  cam.classList.add("isFrozen");
  retake.style.display="flex";
  statusPill.style.display="none"; idleHint.style.display="none";
  messages=[]; thread.innerHTML=""; clearErr();
}
function unfreeze(){
  frozenB64=null; messages=[]; thread.innerHTML=""; inp.value=""; clearErr();
  frozen.style.display="none"; frozen.classList.remove("dim","frzAnim");
  cam.classList.remove("isFrozen");
  retake.style.display="none";
  closeSheet();
  if(fallback) enterFallback("The shutter and Ask open the system camera.");
  else startCamera();
}
retake.onclick=unfreeze;

shutter.onclick=()=>{
  if(starting || frozenB64) return;
  if(live){
    if(!vf.videoWidth) return;
    freeze(frameToJpeg(vf, vf.videoWidth, vf.videoHeight));
  }else{
    camInput.click(); // capture="environment" opens the rear camera directly on iOS
  }
};
askBtn.onclick=()=>{
  if(starting) return;
  if(frozenB64){
    openSheet();
    if(!messages.length && !loading) firstAsk();
  }else if(live){
    if(!vf.videoWidth) return;
    freeze(frameToJpeg(vf, vf.videoWidth, vf.videoHeight));
    openSheet();
    firstAsk();
  }else{
    pendingAsk=true;
    camInput.click();
  }
};
searchBtn.onclick=()=> showToast("Search isn't wired up yet.");

camInput.onchange=(e)=>{
  const f=e.target.files && e.target.files[0]; e.target.value="";
  if(!f){ pendingAsk=false; return; }
  const url=URL.createObjectURL(f); const im=new Image();
  im.onload=()=>{
    const img=frameToJpeg(im, im.naturalWidth, im.naturalHeight);
    URL.revokeObjectURL(url);
    freeze(img);
    if(pendingAsk){ pendingAsk=false; openSheet(); firstAsk(); }
  };
  im.onerror=()=>{
    URL.revokeObjectURL(url); pendingAsk=false;
    showToast("Couldn't decode that image.");
  };
  im.src=url;
};

// ── Ask sheet ──
function openSheet(){ sheet.classList.add("open"); frozen.classList.add("dim"); scrollEnd(); }
function closeSheet(){ sheet.classList.remove("open"); frozen.classList.remove("dim"); }
sheetClose.onclick=closeSheet;

// launch glow: one pulse, then the class leaves so .thinking can reuse the element
glow.classList.add("hello");
glow.addEventListener("animationend",e=>{ if(e.animationName==="glowPulse") glow.classList.remove("hello","snap"); });
setTimeout(()=>glow.classList.remove("hello"), 3200); // fallback if animation events never fire

// ── sheet drag-to-dismiss ──
let dragStart=null, dragT0=0;
[grab, sheetHead].forEach(z=>{
  z.addEventListener("pointerdown",e=>{
    if(!sheet.classList.contains("open")) return;
    dragStart=e.clientY; dragT0=performance.now();
    sheet.style.transition="none";
    try{ z.setPointerCapture(e.pointerId); }catch(_){}
  });
  z.addEventListener("pointermove",e=>{
    if(dragStart===null) return;
    sheet.style.transform="translateY("+Math.max(0, e.clientY-dragStart)+"px)";
  });
  const endDrag=e=>{
    if(dragStart===null) return;
    const dy=Math.max(0, e.clientY-dragStart);
    const speed=dy/Math.max(1, performance.now()-dragT0);
    sheet.style.transition=""; sheet.style.transform="";
    if(dy>130 || speed>0.5) closeSheet();
    dragStart=null;
  };
  z.addEventListener("pointerup",endDrag);
  z.addEventListener("pointercancel",endDrag);
});

function setLoading(on){
  loading=on;
  loadRow.classList.toggle("show",on);
  glow.classList.toggle("thinking",on);
  send.disabled=on;
  scrollEnd();
}
function clearErr(){ errRow.classList.remove("show"); errRow.textContent=""; }
function showErr(msg, retryFn){
  errRow.textContent="Error: "+msg;
  if(retryFn){
    const b=document.createElement("button");
    b.className="toolBtn"; b.textContent="Retry";
    b.onclick=()=>{ clearErr(); retryFn(); };
    errRow.appendChild(b);
  }
  errRow.classList.add("show");
}
function scrollEnd(){ requestAnimationFrame(()=>{ thread.scrollTop=thread.scrollHeight; }); }

async function callAPIStream(msgs, onDelta){
  const body={ max_tokens:MAX_TOKENS, messages:msgs };
  const res=await fetch(RELAY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok || !res.body){
    let msg="HTTP "+res.status;
    try{ const d=await res.json(); if(d.error) msg=d.error.message||msg; }catch(_){}
    throw new Error(msg);
  }
  const reader=res.body.getReader(), dec=new TextDecoder();
  let buf="", full="", sources=null, errMsg=null;
  for(;;){
    const {done,value}=await reader.read();
    if(done) break;
    buf+=dec.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf("\n"))>=0){
      const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
      if(!line) continue;
      let ev; try{ ev=JSON.parse(line); }catch(_){ continue; }
      if(ev.t==="delta"){ full+=ev.text; onDelta(full); }
      else if(ev.t==="sources"){ sources=ev.items; }
      else if(ev.t==="error"){ errMsg=ev.message; }
    }
  }
  if(errMsg && !full) throw new Error(errMsg);
  if(!full.trim()) throw new Error("The model returned no text.");
  return { text: full.trim(), sources, error: errMsg };
}
async function streamInto(msgs){
  const a=document.createElement("div"); a.className="ans serif";
  thread.appendChild(a);
  let started=false;
  try{
    const r=await callAPIStream(msgs, full=>{
      if(!started){ started=true; loadRow.classList.remove("show"); }
      a.innerHTML=mdToHtml(full);
      scrollEnd();
    });
    finishAnswer(a, r.text, r.sources);
    if(r.error) showErr(r.error); // stream broke after partial text: keep it, surface the cause
    return r.text;
  }catch(e){
    a.remove();
    throw e;
  }
}
async function firstAsk(extra){
  const text = ASK_PROMPT + (extra ? "\n\nThe user also asks: "+extra : "");
  const first=[{role:"user",content:[
    {type:"image",source:{type:"base64",media_type:"image/jpeg",data:frozenB64}},
    {type:"text",text}
  ]}];
  setLoading(true); clearErr();
  try{
    const txt=await streamInto(first);
    messages=[...first,{role:"assistant",content:txt}];
  }catch(e){
    messages=[];
    showErr(String(e.message||e), ()=>firstAsk(extra));
  }finally{ setLoading(false); }
}
async function sendFollowUp(){
  const t=inp.value.trim();
  if(!t || loading || !frozenB64) return;
  inp.value="";
  addUserMsg(t);
  if(!messages.length){ firstAsk(t); return; } // first ask failed earlier: retry with the question attached
  setLoading(true); clearErr();
  const msgs=[...messages,{role:"user",content:t}];
  try{
    const txt=await streamInto(msgs);
    messages=[...msgs,{role:"assistant",content:txt}];
  }catch(e){ showErr(String(e.message||e)); }
  finally{ setLoading(false); }
}
send.onclick=sendFollowUp;
inp.addEventListener("keydown",e=>{ if(e.key==="Enter") sendFollowUp(); });

// ── rendering ──
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function inlineMd(s){
  return esc(s)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,"$1<em>$2</em>");
}
function mdToHtml(text){
  return text.split("\n").map(ln=>{
    const t=ln.trim();
    if(!t) return '<div class="gap"></div>';
    if(/^#{1,4}\s/.test(t)) return '<div class="hd">'+inlineMd(t.replace(/^#{1,4}\s/,""))+"</div>";
    if(/^[-•]\s/.test(t)) return '<div class="bl"><span>&#183;</span><span>'+inlineMd(t.replace(/^[-•]\s/,""))+"</span></div>";
    const num=t.match(/^(\d+)[.)]\s+(.*)$/);
    if(num) return '<div class="bl"><span>'+num[1]+'.</span><span>'+inlineMd(num[2])+"</span></div>";
    return "<p>"+inlineMd(t)+"</p>";
  }).join("");
}
function addUserMsg(t){
  const d=document.createElement("div"); d.className="userMsg";
  const inner=document.createElement("div"); inner.textContent=t;
  d.appendChild(inner); thread.appendChild(d);
  scrollEnd();
}
function finishAnswer(a, text, sources){
  a.innerHTML=mdToHtml(text);
  if(sources && sources.length){
    const s=document.createElement("div"); s.className="srcRow";
    sources.forEach(it=>{
      const l=document.createElement("a");
      l.className="srcChip"; l.href=it.url; l.target="_blank"; l.rel="noopener";
      l.textContent=(it.title||"source").replace(/^www\./,"");
      s.appendChild(l);
    });
    thread.appendChild(s);
  }
  const tools=document.createElement("div"); tools.className="tools";
  const cp=document.createElement("button"); cp.className="toolBtn"; cp.textContent="Copy";
  cp.onclick=async()=>{
    try{ await navigator.clipboard.writeText(text); cp.textContent="Copied"; cp.classList.add("ok"); }
    catch{ cp.textContent="Long-press to copy"; }
    setTimeout(()=>{ cp.textContent="Copy"; cp.classList.remove("ok"); },1800);
  };
  tools.appendChild(cp);
  thread.appendChild(tools);
  scrollEnd();
}

// ── simulator support (?sim): iPhone 17e safe areas + sample-photo viewfinder ──
if(SIM){
  document.documentElement.style.setProperty("--sat","47px");
  document.documentElement.style.setProperty("--sab","34px");
  // take over the camera: no restarts, no fallback chrome, paint the sample scene
  startCamera=()=>{}; enterFallback=()=>{};
  statusPill.style.display="none"; idleHint.style.display="none";
  cam.style.background="#0B0D10 url('sample.jpg') center/cover no-repeat";
  let simFrame=null;
  const im=new Image();
  im.onload=()=>{ simFrame=frameToJpeg(im,im.naturalWidth,im.naturalHeight); };
  im.src="sample.jpg";
  // shutter and Ask capture the sample, exercising the real freeze/analyze path
  shutter.onclick=()=>{ if(frozenB64||!simFrame) return; freeze(simFrame); };
  askBtn.onclick=()=>{
    if(frozenB64){ openSheet(); if(!messages.length && !loading) firstAsk(); return; }
    if(!simFrame) return;
    freeze(simFrame); openSheet(); firstAsk();
  };
}

// ── temporary viewport diagnostics: open the app with #debug ──
if(location.hash.includes("debug")){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;top:calc(10px + var(--sat));left:10px;z-index:99;"+
    "background:rgba(0,0,0,.75);color:#9BE29B;font:11px/1.6 monospace;padding:8px 10px;"+
    "border-radius:8px;pointer-events:none;white-space:pre";
  document.body.appendChild(d);
  const upd=()=>{
    const vv=window.visualViewport;
    d.textContent=
      "standalone: "+(navigator.standalone===true)+
      "\ninnerH:     "+window.innerHeight+
      "\nvisualH:    "+(vv?Math.round(vv.height):"n/a")+
      "\nclientH:    "+document.documentElement.clientHeight+
      "\nscreenH:    "+screen.height+" (dpr "+devicePixelRatio+")"+
      "\ncamH:       "+cam.offsetHeight+
      "\nvfH:        "+vf.offsetHeight+"  video "+vf.videoWidth+"x"+vf.videoHeight+
      "\ndvh ok:     "+CSS.supports("height","100dvh")+
      "\nsafeBottom: "+getComputedStyle(document.documentElement).getPropertyValue("--sab");
  };
  upd(); setInterval(upd,800);
}

// ── toast ──
let toastT=null;
function showToast(t){
  toast.textContent=t; toast.classList.add("show");
  clearTimeout(toastT);
  toastT=setTimeout(()=>toast.classList.remove("show"),1900);
}
</script>
